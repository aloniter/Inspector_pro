name: InspectorPro
options:
  bundleIdPrefix: com.aloniter.inspectorpro
  deploymentTarget:
    iOS: "18.0"
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UIUserInterfaceStyle: Automatic

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  InspectorPro:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: InspectorPro
        excludes:
          - "**/.DS_Store"
    resources:
      - path: InspectorPro/Resources
    dependencies:
      - package: ZIPFoundation
      - package: Supabase
    scheme:
      testTargets:
        - InspectorProTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aloniter.inspectorpro
        DEVELOPMENT_TEAM: H29SVV6K2S
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_NSCameraUsageDescription: "המצלמה נדרשת לצילום תמונות לפרויקט"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "גישה לגלריה נדרשת לייבוא תמונות לפרויקט"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_CFBundleDisplayName: Inspectley
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  InspectorProTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: InspectorProTests
    dependencies:
      - target: InspectorPro
    settings:
      base:
        DEVELOPMENT_TEAM: H29SVV6K2S
        GENERATE_INFOPLIST_FILE: YES
